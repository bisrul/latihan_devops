name: CI/CD Data Pipeline

on:
  push:
    branches:
      - main # Pipeline jalan otomatis setiap Anda melakukan git push ke branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v3

    - name: 2. Login ke Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 3. Build dan Push Image ke Docker Hub
      run: |
        # Menggunakan format Repo/Image_Name
        # Ganti 'username_anda' dengan username Docker Hub asli Anda
        DOCKER_REPO="bisrulkh/analisis-data-app"
        
        docker build -t $DOCKER_REPO:latest .
        docker push $DOCKER_REPO:latest